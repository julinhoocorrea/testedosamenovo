<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agência Check - Redirecionando...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Redirecionar imediatamente para o sistema React
        window.location.href = '/testedosamenovo/';
    </script>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>🚀 Agência Check</h2>
        <p>Redirecionando para o sistema...</p>
        <p><a href="/testedosamenovo/" style="color: white;">Clique aqui se não redirecionar automaticamente</a></p>
    </div>
</body>
</html>
